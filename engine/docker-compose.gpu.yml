services:
  my_postgres_db: 
    image: postgres:15
    container_name: olist_db_gpu  
    env_file:
      - .env 
    ports:
      - "5432:5432" 
    volumes:
      - olist_db_data:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  python_engine:
    build:
      context: .
      dockerfile: Dockerfile.gpu 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    container_name: olist_python_engine_gpu
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      my_postgres_db:
        condition: service_healthy
    command: tail -f /dev/null
  
volumes:
  olist_db_data: